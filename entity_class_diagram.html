  <meta charset="utf-8">

  <title>Esybių klasių modelis</title>
  <style>
    :root {
      --ink: #1f1f1f;
      --line: #333333;
      --muted-line: #6d6d6d;
      --paper: #fbfaf7;
      --package: #ffffff;
      --class-fill: #fff3bf;
      --class-head: #f7dfa1;
      --enum-fill: #fff7d6;
      --enum-head: #f1d28a;
      --border: #242424;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: "Times New Roman", Times, serif;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid #d6d0c4;
      background: rgba(251, 250, 247, 0.94);
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 15px;
    }

    .legend {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      white-space: nowrap;
    }

    .legend-line {
      width: 42px;
      border-top: 2px solid var(--line);
    }

    .legend-line.migration {
      border-top-color: var(--muted-line);
      border-top-style: dashed;
    }

    .canvas-wrap {
      padding: 22px;
      overflow: auto;
    }

    .package {
      position: relative;
      width: 3560px;
      height: 2280px;
      background: var(--package);
      border: 2px solid #2a2a2a;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .package-tab {
      position: absolute;
      top: -2px;
      left: -2px;
      min-width: 430px;
      padding: 10px 18px 9px;
      border: 2px solid #2a2a2a;
      border-bottom: 0;
      background: #ffffff;
      font-size: 23px;
      font-weight: 700;
      line-height: 1.1;
    }

    .package-title {
      position: absolute;
      top: 54px;
      left: 26px;
      font-size: 19px;
      color: #303030;
    }

    #relationships {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .uml-box {
      position: absolute;
      z-index: 2;
      box-sizing: border-box;
      border: 1.6px solid var(--border);
      background: var(--class-fill);
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.12);
    }

    .uml-box.enum {
      background: var(--enum-fill);
    }

    .uml-title {
      border-bottom: 1.4px solid var(--border);
      background: var(--class-head);
      padding: 6px 8px 7px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.1;
    }

    .uml-box.enum .uml-title {
      background: var(--enum-head);
    }

    .stereo {
      display: block;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.15;
    }

    .section-label {
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-style: italic;
      text-align: center;
      background: rgba(255, 255, 255, 0.34);
    }

    .attributes {
      margin: 0;
      padding: 6px 10px 9px 16px;
      list-style: none;
      font-size: 14px;
      line-height: 1.28;
    }

    .attributes li {
      white-space: nowrap;
    }

    .connector {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
    }

    .connector.migration {
      stroke: var(--muted-line);
      stroke-dasharray: 8 5;
    }

    .relationship-label,
    .cardinality {
      font-family: "Times New Roman", Times, serif;
      fill: #111111;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 4px;
      stroke-linejoin: round;
      font-size: 15px;
    }

    .cardinality {
      font-size: 16px;
      font-weight: 700;
    }

    @media print {
      .toolbar {
        display: none;
      }

      .canvas-wrap {
        padding: 0;
      }

      .package {
        box-shadow: none;
      }
    }
  </style>
</head>

      { from: "Plot", to: "AccessRight", label: "accessRights", fromCard: "1", toCard: "0..*" },
      { from: "GardenOwner", to: "AccessRight", label: "grantor", fromCard: "1", toCard: "0..*" },
      { from: "GardenOwner", to: "AccessRight", label: "recipient", fromCard: "1", toCard: "0..*" },
      { from: "Profile", to: "AccessRight", label: "grantorProfile", fromCard: "1", toCard: "0..*" },
      { from: "Profile", to: "AccessRight", label: "recipientProfile", fromCard: "1", toCard: "0..*" },
      { from: "GardenOwner", to: "CommunityPost", label: "communityPosts", fromCard: "1", toCard: "0..*" },
      { from: "Profile", to: "CommunityPost", label: "communityPosts", fromCard: "1", toCard: "0..*" },
      { from: "Plot", to: "CommunityPost", label: "communityPosts", fromCard: "0..1", toCard: "0..*" }
    ];

    const packageEl = document.getElementById("package");
    const svg = document.getElementById("relationships");
    const boxById = new Map();

    function makeBox(box) {
      const el = document.createElement("article");
      el.className = `uml-box ${box.type === "enum" ? "enum" : ""}`;
      el.style.left = `${box.x}px`;
      el.style.top = `${box.y}px`;
      el.style.width = `${box.w}px`;
      el.dataset.id = box.id;

      const title = document.createElement("div");
      title.className = "uml-title";
      const stereo = document.createElement("span");
      stereo.className = "stereo";
      stereo.textContent = box.type === "enum" ? enumClass : modelClass;
      title.append(stereo, document.createTextNode(box.name));

      const section = document.createElement("div");
      section.className = "section-label";
      section.textContent = box.type === "enum" ? "enumeration literals" : "attributes";

      const list = document.createElement("ul");
      list.className = "attributes";
      box.attributes.forEach((attribute) => {
        const li = document.createElement("li");
        li.textContent = box.type === "enum" ? `- ${attribute}` : attribute;
        list.appendChild(li);
      });

      el.append(title, section, list);
      packageEl.appendChild(el);
      boxById.set(box.id, { ...box, el });
    }

    function center(box) {
      return { x: box.x + box.w / 2, y: box.y + box.el.offsetHeight / 2 };
    }

    function endpoint(from, to) {
      const a = center(from);
      const b = center(to);
      const dx = b.x - a.x;
      const dy = b.y - a.y;

      if (Math.abs(dx) > Math.abs(dy)) {
        return {
          start: { x: dx > 0 ? from.x + from.w : from.x, y: a.y },
          end: { x: dx > 0 ? to.x : to.x + to.w, y: b.y }
        };
      }

      return {
        start: { x: a.x, y: dy > 0 ? from.y + from.el.offsetHeight : from.y },
        end: { x: b.x, y: dy > 0 ? to.y : to.y + to.el.offsetHeight }
      };
    }

    function orthogonalPoints(start, end) {
      const horizontal = Math.abs(end.x - start.x) >= Math.abs(end.y - start.y);
      if (horizontal) {
        const midX = (start.x + end.x) / 2;
        return [start, { x: midX, y: start.y }, { x: midX, y: end.y }, end];
      }

      const midY = (start.y + end.y) / 2;
      return [start, { x: start.x, y: midY }, { x: end.x, y: midY }, end];
    }

    function svgElement(name, attributes = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attributes).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function addText(text, x, y, className, anchor = "middle") {
      const el = svgElement("text", { x, y, class: className, "text-anchor": anchor });
      el.textContent = text;
      svg.appendChild(el);
    }

    function drawRelationship(rel, index) {
      const from = boxById.get(rel.from);
      const to = boxById.get(rel.to);
      if (!from || !to) {
        return;
      }

      const { start, end } = endpoint(from, to);
      const offset = ((index % 5) - 2) * 8;
      const points = orthogonalPoints(
        { x: start.x, y: start.y + offset },
        { x: end.x, y: end.y + offset }
      );

      const polyline = svgElement("polyline", {
        points: points.map((point) => `${point.x},${point.y}`).join(" "),
        class: `connector ${rel.status === "VERIFIED_MIGRATION_FK" ? "migration" : ""}`
      });
      svg.appendChild(polyline);

      const labelPoint = points[Math.floor(points.length / 2)];
      const labelX = (points[1].x + points[2].x) / 2;
      const labelY = (points[1].y + points[2].y) / 2 - 7;
      addText(rel.label, Number.isFinite(labelX) ? labelX : labelPoint.x, Number.isFinite(labelY) ? labelY : labelPoint.y, "relationship-label");

      const startLabelX = start.x + (end.x >= start.x ? 18 : -18);
      const endLabelX = end.x + (end.x >= start.x ? -18 : 18);
      addText(rel.fromCard, startLabelX, start.y + offset - 8, "cardinality");
      addText(rel.toCard, endLabelX, end.y + offset - 8, "cardinality");
    }

    boxes.forEach(makeBox);
    relationships.forEach(drawRelationship);
  </script>
</body>
</html>
